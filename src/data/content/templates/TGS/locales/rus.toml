# The Grand Story - Russian locale

title = "Великая история"
longTitle = "Великая история Библии"
description = "Путешествие по ключевым моментам Библии — от начала до конца."

[01]
title = "Сцены из Ветхого Завета"
description = "История народа Божьего — как всё началось, их путь и обещание грядущего Спасителя."

[01.01]
title = "В начале"
description = "Бог творит небо и землю, свет и тьму, и создаёт человека из праха земного."

[01.02]
title = "От Едема до Вавилона"
description = "Грехопадение в саду, великий потоп во дни Ноя и рассеяние народов при строительстве Вавилонской башни."

[01.03]
title = "Авраам, Исаак и Иаков"
description = "Бог призывает Авраама и заключает с ним завет. Вера Авраама испытана. Иаков борется с Богом и получает новое имя — Израиль."

[01.04]
title = "Иосиф в Египте"
description = "Иосиф продан братьями, возвышается, истолковав сны фараона, и прощает братьев, когда те приходят в Египет."

[01.05]
title = "Моисей и Исход"
description = "Бог призывает Моисея из горящего куста. Пасхальный агнец спасает Израиль. Красное море расступается. Бог даёт Десять заповедей на Синае."

[01.06]
title = "Израиль в пустыне"
description = "Бог даёт манну с неба и воду из скалы. Моисей учит Израиль великой заповеди: Люби Господа Бога твоего."

[01.07]
title = "Земля обетованная"
description = "Иисус Навин ведёт Израиль в Землю обетованную. Стены Иерихона падают от звука труб и клича народа."

[01.08]
title = "Самсон и Далида"
description = "Самсон, могучий судья, предан Далидой. Сила отнята у него, но своим последним деянием он обрушивает храм филистимлян."

[01.09]
title = "История Руфи"
description = "Руфь клянётся в верности Ноемини: «Куда ты пойдёшь, туда и я пойду.» Вооз выкупает Руфь, и она становится праматерью царя Давида."

[01.10]
title = "Самуил, Саул и Давид"
description = "Отрок Самуил слышит Божий зов. Пастух Давид побеждает великана Голиафа. Бог заключает вечный завет с Давидом."

[01.11]
title = "Соломон мудрый"
description = "Соломон просит у Бога мудрости и получает её. Он строит и посвящает Храм в Иерусалиме как дом молитвы для всех народов."

[01.12]
title = "Илия пророк"
description = "Илия бросает вызов пророкам Ваала на горе Кармил. Огонь нисходит с неба. Позже Бог говорит Илии тихим и кротким голосом."

[01.13]
title = "История Ионы"
description = "Иона бежит от Бога и проглочен огромной рыбой. Он проповедует Ниневии, и великий город кается."

[01.14]
title = "Изгнание и возвращение"
description = "Иерусалим пал перед Вавилоном, и народ уведён в плен. Царь Кир Персидский издаёт указ об их возвращении."

[01.15]
title = "Пророчество"
description = "Исаия предсказывает страдающего раба, несущего грехи многих, и обещанного владыку, чьему царству не будет конца."

[02]
title = "Сцены из Нового Завета"
description = "Как Иисус изменил всё — и что последовало после воскресения."

[02.01]
title = "В начале"
description = "В начале было Слово, и Слово было у Бога, и Слово было Бог. И Слово стало плотью и обитало среди нас."

[02.02]
title = "Рождение Иисуса"
description = "Иисус рождается в Вифлееме. Ангелы возвещают пастухам в полях великую радость: родился Спаситель."

[02.03]
title = "Целитель"
description = "Иисус исцеляет прокажённого прикосновением. Он прощает и исцеляет расслабленного, которого друзья спустили через крышу."

[02.04]
title = "Учитель"
description = "Иисус возвещает Заповеди блаженства на горе. Он называет наибольшую заповедь. Он рассказывает притчу о блудном сыне."

[02.05]
title = "Жертва"
description = "Иисус разделяет Тайную вечерю с учениками. Он распят, умирает, и на третий день воскресает из мёртвых."

[02.06]
title = "Деяния апостолов"
description = "Святой Дух сходит в Пятидесятницу с ветром и огнём. Савл встречает воскресшего Христа на пути в Дамаск и преображается."

[02.07]
title = "Видение"
description = "Иоанн видит новое небо и новую землю. Бог будет обитать со Своим народом. Не будет больше ни смерти, ни скорби, ни боли."

