# The Grand Story - Arabic locale

title = "القصة الكبرى"
longTitle = "القصة الكبرى للكتاب المقدس"
description = "رحلة عبر اللحظات المفصلية في الكتاب المقدس — من البداية إلى النهاية."

[01]
title = "مشاهد من العهد القديم"
description = "قصة شعب الله — كيف بدأ كل شيء، رحلتهم، والوعد بمخلّص آتٍ."

[01.01]
title = "في البدء"
description = "خلق الله السماوات والأرض، النور والظلمة، وجبل الإنسان من تراب الأرض."

[01.02]
title = "من عدن إلى بابل"
description = "سقوط الإنسان في الجنة، والطوفان العظيم في أيام نوح، وتشتّت الشعوب عند برج بابل."

[01.03]
title = "إبراهيم وإسحاق ويعقوب"
description = "دعا الله إبراهيم وقطع معه عهداً. امتُحن إيمان إبراهيم. صارع يعقوب الله ونال اسماً جديداً — إسرائيل."

[01.04]
title = "يوسف في مصر"
description = "باعه إخوته، فارتقى إلى السلطة بتفسير أحلام فرعون، وسامح إخوته حين جاؤوا إلى مصر."

[01.05]
title = "موسى والخروج"
description = "دعا الله موسى من العلّيقة المشتعلة. خروف الفصح أنقذ إسرائيل. انشقّ البحر الأحمر. أعطى الله الوصايا العشر في سيناء."

[01.06]
title = "إسرائيل في البرية"
description = "أعطى الله المنّ من السماء والماء من الصخرة. علّم موسى إسرائيل الوصية العظمى: أحبّ الربّ إلهك."

[01.07]
title = "أرض الموعد"
description = "قاد يشوع إسرائيل إلى أرض الموعد. سقطت أسوار أريحا عند صوت الأبواق وهتاف الشعب."

[01.08]
title = "شمشون ودليلة"
description = "شمشون، القاضي الجبار، خانته دليلة. أُخذت قوته، لكنه في عمله الأخير هدم هيكل الفلسطينيين."

[01.09]
title = "قصة راعوث"
description = "تعهّدت راعوث بالوفاء لنعمي: 'حيثما ذهبتِ أذهب.' فدى بوعز راعوث، وصارت جدّة الملك داود."

[01.10]
title = "صموئيل وشاول وداود"
description = "سمع الصبي صموئيل نداء الله. هزم الراعي داود الجبار جليات. قطع الله عهداً أبدياً مع داود."

[01.11]
title = "سليمان الحكيم"
description = "طلب سليمان من الله حكمة فنالها. بنى الهيكل في أورشليم وكرّسه بيت صلاة لجميع الأمم."

[01.12]
title = "إيليا النبي"
description = "تحدّى إيليا أنبياء البعل على جبل الكرمل. نزلت نار من السماء. ثم كلّم الله إيليا بصوت هادئ خفيف."

[01.13]
title = "قصة يونان"
description = "هرب يونان من الله فابتلعه حوت عظيم. بشّر نينوى فتابت المدينة العظيمة."

[01.14]
title = "السبي والعودة"
description = "سقطت أورشليم بيد بابل وسُبي الشعب. أصدر كورش ملك فارس أمراً بعودتهم."

[01.15]
title = "نبوءة"
description = "تنبّأ إشعياء عن عبد متألّم يحمل خطايا الكثيرين، وعن حاكم موعود لا نهاية لملكه."

[02]
title = "مشاهد من العهد الجديد"
description = "كيف غيّر يسوع كل شيء — وما تبع ذلك بعد القيامة."

[02.01]
title = "في البدء"
description = "في البدء كان الكلمة، والكلمة كان عند الله، وكان الكلمة الله. والكلمة صار جسداً وحلّ بيننا."

[02.02]
title = "ميلاد يسوع"
description = "وُلد يسوع في بيت لحم. بشّر الملائكة الرعاة في الحقول بفرح عظيم: وُلد لكم مخلّص."

[02.03]
title = "الشافي"
description = "شفى يسوع رجلاً أبرص بلمسة. غفر لمفلوج وشفاه بعد أن دلّاه أصحابه من السقف."

[02.04]
title = "المعلّم"
description = "علّم يسوع التطويبات على الجبل. ذكر الوصية العظمى. روى مَثَل الابن الضال."

[02.05]
title = "الذبيحة"
description = "شارك يسوع تلاميذه العشاء الأخير. صُلب ومات، وفي اليوم الثالث قام من الأموات."

[02.06]
title = "أعمال الرسل"
description = "حلّ الروح القدس يوم الخمسين بريح ونار. التقى شاول بالمسيح القائم على طريق دمشق فتغيّرت حياته."

[02.07]
title = "رؤيا"
description = "رأى يوحنا سماءً جديدة وأرضاً جديدة. الله يسكن مع شعبه. لن يكون بعد موت ولا حزن ولا ألم."

