# Manual icon overrides for passages not covered by iconsSyncData.
# Uncomment the entries you want to use.
# Format: book, chapter, start verse, end verse, icon IDs.
# The script merges these into iconsSyncData before generating .md files.

# ─── 01/15.md — Isaiah 53:3-7 (The suffering servant) ───
# No icons in iconsSyncData for Isaiah 53.

[[icons]]
book = 23
chapter = 53
start = 3
end = 4
ids = ["23_Is_07_01"]    # Isa 7 — Immanuel prophecy

[[icons]]
book = 23
chapter = 53
start = 5
end = 7
ids = ["23_Is_38_01"]    # Isa 38 — Hezekiah's illness

